<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>桌面机器人 BLE 控制</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(circle at top,#0f2027,#000);color:#00ffe1;font-family:"Microsoft YaHei",Arial,sans-serif;display:flex;justify-content:center;align-items:center;padding:10px}
.panel{width:340px;max-width:100%;padding:18px 14px;border-radius:14px;background:rgba(0,255,225,0.05);border:1px solid rgba(0,255,225,0.4);box-shadow:0 0 25px rgba(0,255,225,0.3)}
h2{text-align:center;margin:0 0 10px;letter-spacing:2px;font-size:18px}
#connStatus{text-align:center;padding:10px;margin-bottom:10px;border-radius:8px;font-size:14px;transition:all .3s}
.disconnected{background:rgba(255,50,50,0.2);border:1px solid rgba(255,50,50,0.5);color:#ff6666}
.connected{background:rgba(0,255,100,0.2);border:1px solid rgba(0,255,100,0.5);color:#00ff64}
.btn-connect{display:inline-block;padding:8px 24px;margin-top:5px;border:none;border-radius:8px;background:linear-gradient(145deg,#00aaff,#0088cc);color:#fff;font-size:14px;font-weight:bold;cursor:pointer}
.btn-connect:hover{opacity:0.8}.btn-connect:disabled{opacity:0.4;cursor:not-allowed}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:56px 56px 56px;gap:8px}
.grid button{border:none;border-radius:10px;font-size:14px;font-weight:bold;background:linear-gradient(145deg,#0ff,#00b3a4);color:#000;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.grid button:hover{opacity:0.8}.grid button:active{transform:scale(0.95)}
.stop-btn{background:linear-gradient(145deg,#ff5555,#aa0000)!important;color:#fff!important}
.empty{background:none!important;cursor:default!important;pointer-events:none}
.row{margin-top:8px;display:flex;gap:6px}
.row button{flex:1;padding:10px 4px;border:none;border-radius:8px;font-size:13px;font-weight:bold;background:linear-gradient(145deg,#0ff,#00b3a4);color:#000;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.row button:hover{opacity:0.8}.row button:active{transform:scale(0.95)}
.mode-group{display:flex;gap:6px;margin-top:8px}
.mode-group button{flex:1;padding:8px 2px;border:2px solid rgba(0,255,225,0.3);border-radius:8px;font-size:12px;font-weight:bold;background:rgba(0,255,225,0.05);color:#00ffe1;cursor:pointer;opacity:0.6;transition:all .3s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.mode-group button.active{opacity:1;border-color:#00ff64;background:rgba(0,255,100,0.2);box-shadow:0 0 12px rgba(0,255,100,0.5)}
.mode-group button.mode-off.active{border-color:#ff5555;background:rgba(255,50,50,0.2);box-shadow:0 0 12px rgba(255,50,50,0.5)}
.exp-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-top:8px}
.exp-grid button{padding:8px 2px;border:2px solid rgba(255,170,0,0.2);border-radius:8px;font-size:11px;font-weight:bold;background:rgba(255,170,0,0.05);color:#ffaa00;cursor:pointer;opacity:0.6;transition:all .3s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.exp-grid button.active{opacity:1;border-color:#ffaa00;background:rgba(255,170,0,0.2);box-shadow:0 0 10px rgba(255,170,0,0.5)}
.time-section{margin-top:8px;padding:10px;background:rgba(0,255,225,0.05);border-radius:8px;border:1px dashed rgba(0,255,225,0.3);text-align:center}
.time-section .label{font-size:12px;color:#00ff9c;margin-bottom:4px}
.time-section .tval{font-size:18px;font-weight:bold;letter-spacing:2px}
.time-btn{margin-top:6px;width:100%;padding:8px;border:none;border-radius:8px;background:linear-gradient(145deg,#00aaff,#0088cc);color:#fff;font-size:13px;font-weight:bold;cursor:pointer}
.time-btn:hover{opacity:0.8}
.log{margin-top:8px;padding:6px 8px;background:rgba(0,0,0,0.3);border-radius:6px;font-size:11px;color:rgba(0,255,225,0.6);max-height:60px;overflow-y:auto;line-height:1.5}
.footer{margin-top:10px;text-align:center;font-size:11px;opacity:0.5;letter-spacing:1px}
.dance-progress{height:3px;margin-top:6px;border-radius:2px;background:rgba(0,255,225,0.1);overflow:hidden;display:none}
.dance-progress .bar{height:100%;width:0%;background:linear-gradient(90deg,#0ff,#00ff64);transition:width .2s}
</style>
</head>
<body>
<div class="panel">
  <h2>&#x1F916; 桌面机器人</h2>
  <div id="connStatus" class="disconnected">&#x1F534; 未连接<br><button class="btn-connect" id="btnConnect" onclick="conn()">&#x1F517; 连接机器人</button></div>
  <div class="grid">
    <div class="empty"></div>
    <button onpointerdown="ble('move','forward')">&#x2B06; 前进</button>
    <div class="empty"></div>
    <button onpointerdown="ble('rotate','left')">&#x2B05; 左转</button>
    <button class="stop-btn" onpointerdown="stop()">&#x23F9; 停止</button>
    <button onpointerdown="ble('rotate','right')">&#x27A1; 右转</button>
    <div class="empty"></div>
    <button onpointerdown="ble('move','backward')">&#x2B07; 后退</button>
    <div class="empty"></div>
  </div>
  <div class="row">
    <button onclick="dance()">&#x1F483; 跳舞</button>
    <button onclick="ble('spin','',360)">&#x1F504; 转圈</button>
  </div>
  <div class="dance-progress" id="dp"><div class="bar" id="db"></div></div>
  <div class="mode-group">
    <button id="m0" class="mode-off" onclick="mode('off')">&#x1F319; 睡眠</button>
    <button id="m1" class="active" onclick="mode('soft')">&#x3030;&#xFE0F; 摆动</button>
    <button id="m2" onclick="mode('normal')">&#x1F50D; 好奇</button>
  </div>
  <div class="exp-grid">
    <button id="e0" onclick="expr(0)">&#x1F610; 默认</button>
    <button id="e1" onclick="expr(1)">&#x1F62A; 疲惫</button>
    <button id="e2" class="active" onclick="expr(2)">&#x1F620; 生气</button>
    <button id="e3" onclick="expr(3)">&#x1F60A; 开心</button>
    <button id="e4" onclick="expr(4)">&#x1F622; 伤心</button>
    <button id="e5" onclick="expr(5)">&#x1F642; 微笑</button>
    <button id="e6" onclick="expr(6)">&#x1F604; 大笑</button>
    <button id="e7" onclick="expr(7)">&#x1F62D; 哭泣</button>
  </div>
  <div class="time-section">
    <div class="label">&#x1F550; 机器人时间</div>
    <div class="tval"><span id="dd">--</span> <span id="dt">--:--:--</span></div>
    <button class="time-btn" onclick="syncTime()">&#x1F4F1; 同步时间</button>
  </div>
  <div class="log" id="log">等待连接...</div>
  <div class="footer">淘宝：智趣电赛工坊</div>
</div>
<script>
var C, X, Y;
var L = document.getElementById("log");

function g(s){var t=new Date().toLocaleTimeString();L.innerHTML+="["+t+"] "+s+"<br>";L.scrollTop=L.scrollHeight}

async function conn(){
  if(C&&C.gatt.connected){C.gatt.disconnect();st(0);return}
  try{
    g("正在扫描设备...");
    C=await navigator.bluetooth.requestDevice({filters:[{services:["4fafc201-1fb5-459e-8fcc-c5c9c331914b"]}],optionalServices:["4fafc201-1fb5-459e-8fcc-c5c9c331914b"]});
    g("已发现: "+C.name);
    var s=await C.gatt.connect();
    var v=await s.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
    X=await v.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
    Y=await v.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a9");
    await Y.startNotifications();
    Y.addEventListener("characteristicvaluechanged",function(e){
      try{var d=JSON.parse(new TextDecoder("utf-8").decode(e.target.value));if(d.type=="mode"&&d.mode){["m0","m1","m2"].forEach(function(i){document.getElementById(i).classList.remove("active")});var b=document.getElementById("m"+(d.mode=="off"?0:d.mode=="soft"?1:2));if(b)b.classList.add("active")}}catch(_){}
    });
    C.addEventListener("gattserverdisconnected",function(){g("已断开");st(0);X=Y=null});
    st(1);g("已连接");setTimeout(function(){snd({type:"query",action:"get_mode"})},300)
  }catch(e){g("失败: "+e.message);st(0)}
}

function st(v){
  var s=document.getElementById("connStatus");
  if(v){s.className="connected";s.innerHTML="&#x1F7E2; 已连接 ZhiQu-Bot"}
  else{s.className="disconnected";s.innerHTML="&#x1F534; 未连接<br><button class=\"btn-connect\" onclick=\"conn()\">&#x1F517; 连接机器人</button>"}
}

function snd(o){if(!X)return;var j=JSON.stringify(o);X.writeValue(new TextEncoder().encode(j));g("> "+j)}

function ble(a,d,x){if(!X){g("请先连接");return}
  if(a=="move")snd({type:"action",action:"move",params:{direction:d}})
  else if(a=="rotate")snd({type:"action",action:"rotate",params:{direction:d,angle:80}})
  else if(a=="spin")snd({type:"action",action:"spin",params:{angle:x||360}})
}
function stop(){if(!X){g("请先连接");return};snd({type:"action",action:"stop"})}

async function dance(){
  if(!X){g("请先连接");return}
  var st=[{j:{type:"action",action:"move",params:{direction:"forward"}},w:200},{j:{type:"action",action:"stop"},w:100},{j:{type:"action",action:"move",params:{direction:"backward"}},w:200},{j:{type:"action",action:"stop"},w:100},{j:{type:"action",action:"rotate",params:{direction:"left",angle:80}},w:250},{j:{type:"action",action:"stop"},w:100},{j:{type:"action",action:"rotate",params:{direction:"right",angle:80}},w:250},{j:{type:"action",action:"stop"},w:100}];
  var p=document.getElementById("dp"),b=document.getElementById("db");p.style.display="block";
  for(var r=0;r<3;r++)for(var i=0;i<st.length;i++){snd(st[i].j);b.style.width=((r*st.length+i+1)/(st.length*3)*100)+"%";await new Promise(function(r){setTimeout(r,st[i].w)})}
  snd({type:"action",action:"stop"});b.style.width="100%";setTimeout(function(){p.style.display="none";b.style.width="0%"},500);g("跳舞完成")
}

function mode(m){
  if(!X){g("请先连接");return}
  snd({type:"action",action:"set_mode",params:{mode:m}});
  ["m0","m1","m2"].forEach(function(i){document.getElementById(i).classList.remove("active")});
  var b=document.getElementById("m"+(m=="off"?0:m=="soft"?1:2));if(b)b.classList.add("active")
}

function expr(n){
  if(!X){g("请先连接");return}
  snd({type:"action",action:"expression",params:{id:n}});
  for(var i=0;i<8;i++)document.getElementById("e"+i).classList.remove("active");
  document.getElementById("e"+n).classList.add("active")
}

function syncTime(){
  if(!X){g("请先连接");return}
  var n=new Date(),ds=n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0"),ts=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0")+":"+String(n.getSeconds()).padStart(2,"0");
  snd({type:"sync_time",params:{date:ds,time:ts}});
  document.getElementById("dd").textContent=ds;document.getElementById("dt").textContent=ts;g("时间已同步")
}

if(!navigator.bluetooth){g("浏览器不支持 Web Bluetooth");document.getElementById("btnConnect").disabled=true}
else{g("支持 Web Bluetooth，点击连接");g("Chrome/Edge/三星浏览器可用")}
</script>
</body>
</html>
